ag_schema: v1
policy_id: AG-DOC-POLICY
title: Agent Group document policy
last_updated: "2026-06-05"
owner: main-orchestrator

purpose:
  - Define machine-readable labels for agent_group documents.
  - Make read/write behavior explicit before agents edit memory files.
  - Keep canonical paths, compatibility symlinks, lifecycle, authority, and sync rules auditable.

path_model:
  canonical_paths:
    rules: ".codex/agent_group/rules/"
    memory: ".codex/agent_group/memory/"
    current: ".codex/agent_group/current/"
    agents: ".codex/agent_group/agents/"
    archive: ".codex/agent_group/archive/"
  compatibility_links:
    enabled: true
    note: "Root-level Markdown links such as .codex/agent_group/BOOTSTRAP.md point to canonical files under rules/ or memory/."
  symlink_rule:
    - "Before writing, resolve symlinks and edit the canonical path."
    - "Do not create frontmatter on symlink paths separately."

frontmatter:
  required_for:
    - "rules/**/*.md"
    - "memory/**/*.md"
    - "current/**/*.md"
    - "agents/**/*.md"
  deferred_for:
    - "archive/**"
    - "current/agent_outputs/**"
  non_markdown_metadata:
    - path: ".codex/agent_group/current/tasks.csv"
      metadata_path: ".codex/agent_group/current/tasks.meta.yml"
      reason: "CSV cannot carry YAML frontmatter safely."
  required_fields:
    - ag_schema
    - doc_id
    - category
    - doc_type
    - authority
    - lifecycle
    - read_policy
    - write_policy
    - risk_level
    - owner
    - allowed_writers
    - canonical_path

categories:
  rules:
    description: "Workflow, routing, worker registry, SOP, and runbook rules."
    default_lifecycle: warm
    default_authority: canonical
    default_write_policy: controlled_update
  memory:
    description: "Long-term roadmap, ledgers, facts, decisions, risks, and architecture documentation."
    default_lifecycle: warm
    default_authority: canonical
    default_write_policy: controlled_update
  current:
    description: "Hot state for the active epic."
    default_lifecycle: hot
    default_authority: canonical
    default_write_policy: controlled_update
  agents:
    description: "Worker role specifications."
    default_lifecycle: warm
    default_authority: canonical
    default_write_policy: controlled_update
  archive:
    description: "Archived evidence and historical snapshots."
    default_lifecycle: archived
    default_authority: evidence
    default_write_policy: immutable
  evidence:
    description: "Worker outputs, reports, logs, and generated evidence."
    default_lifecycle: cold
    default_authority: evidence
    default_write_policy: create_only
  demo:
    description: "Example workflow material that is not authoritative for active work."
    default_lifecycle: cold
    default_authority: demo
    default_write_policy: controlled_update

doc_types:
  doc_policy: {}
  doc_registry: {}
  bootstrap: {}
  routing_policy: {}
  worker_registry: {}
  memory_sync_sop: {}
  runbook: {}
  roadmap: {}
  task_ledger: {}
  progress_ledger: {}
  project_facts: {}
  decision_log: {}
  risk_register: {}
  project_sync_rules: {}
  architecture_doc: {}
  state_summary: {}
  epic: {}
  acceptance: {}
  task_table: {}
  worker_spec: {}
  worker_output: {}
  archive_snapshot: {}
  demo_material: {}

authority_levels:
  canonical:
    meaning: "The document is the source of truth for its topic."
    agent_rule: "Prefer this over derived summaries and historical evidence."
  compat_link:
    meaning: "A compatibility path that resolves to a canonical file."
    agent_rule: "Resolve to canonical_path before editing."
  derived:
    meaning: "A summary or view derived from canonical/evidence documents."
    agent_rule: "Do not use as source of truth if canonical source conflicts."
  evidence:
    meaning: "A report, worker output, log, or archived snapshot used as proof."
    agent_rule: "Read for evidence; do not rewrite historical claims."
  archived:
    meaning: "A historical snapshot preserved under archive/**."
    agent_rule: "Treat as immutable unless explicitly maintaining archive indexes."
  demo:
    meaning: "Example material for demonstration or testing workflows."
    agent_rule: "Do not use as authority for current production decisions."
  deprecated:
    meaning: "Kept for compatibility but superseded by a newer canonical document."
    agent_rule: "Do not use for current decisions unless explicitly auditing history."

lifecycle_levels:
  hot:
    meaning: "Read every cold start or before active task execution."
    examples:
      - ".codex/agent_group/rules/BOOTSTRAP.md"
      - ".codex/agent_group/current/STATE.md"
  warm:
    meaning: "Read on demand when routing, planning, validating, or syncing memory."
  cold:
    meaning: "Read only when investigating evidence or detailed history."
  archived:
    meaning: "Historical snapshot; immutable except archive index maintenance."
  deprecated:
    meaning: "Superseded; retained only to preserve references."

read_policies:
  always:
    rule: "Read on every cold start or before any agent_group task."
  on_demand:
    rule: "Read when the task touches this document's category or doc_type."
  before_write:
    rule: "Read before editing any document listed in sync_targets or governed by this policy."
  review_only:
    rule: "Read during review, audit, or historical investigation."

write_policies:
  immutable:
    allowed_ops:
      - read
    forbidden_ops:
      - edit
      - rewrite
      - truncate
      - delete
  append_only:
    allowed_ops:
      - read
      - append
    forbidden_ops:
      - rewrite_existing_entries
      - truncate
      - delete
  controlled_update:
    allowed_ops:
      - read
      - patch
    requirements:
      - "Writer must be listed in allowed_writers."
      - "Patch must preserve existing unrelated content."
      - "Writer must update sync_targets when applicable."
  rewrite_allowed:
    allowed_ops:
      - read
      - rewrite
    requirements:
      - "Allowed only for hot current-state summaries."
      - "Rewrite must preserve current objective, blockers, evidence paths, and next step."
  create_only:
    allowed_ops:
      - create
      - read
    forbidden_ops:
      - edit_existing
      - delete

risk_levels:
  R0: "Read-only."
  R1: ".codex/agent_group metadata or memory write."
  R2: "Non-core document, script, or report generation."
  R3: "Inference core, CUDA, NNCL, CMake, or build-script change."
  R4: "Remote Orin, nsys, long build, or performance experiment."

agent_execution_rules:
  before_read:
    - "Resolve symlink if path is a compatibility link."
    - "Prefer canonical_path from DOC_REGISTRY.yml when available."
  before_write:
    - "Resolve symlink and write only canonical_path."
    - "Read this policy and the target document metadata."
    - "Check write_policy, risk_level, owner, and allowed_writers."
    - "For append_only documents, append a new dated entry rather than editing history."
  after_write:
    - "Apply sync_targets from DOC_REGISTRY.yml or document frontmatter."
    - "Update memory/PROGRESS_LEDGER.md for non-trivial structure or policy changes."
    - "Update memory/DECISIONS.md when a route, authority, gate, or lifecycle decision changes."
    - "Run a symlink/readability check for changed canonical and compatibility paths."

recommended_frontmatter_template:
  ag_schema: v1
  doc_id: "AG-EXAMPLE"
  category: "rules"
  doc_type: "bootstrap"
  authority: "canonical"
  lifecycle: "hot"
  read_policy: "always"
  write_policy: "controlled_update"
  risk_level: "R1"
  owner: "main-orchestrator"
  allowed_writers:
    - "main-orchestrator"
  allowed_readers:
    - "main-orchestrator"
    - "reviewer"
  canonical_path: ".codex/agent_group/rules/EXAMPLE.md"
  compat_links: []
  update_triggers: []
  sync_targets: []
  forbidden_ops:
    - "delete"
